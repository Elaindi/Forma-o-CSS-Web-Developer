<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--none → Não aplica nenhuma transformação ao texto (valor padrão).

capitalize → Transforma a primeira letra de cada palavra em maiúscula.

uppercase → Transforma todas as letras em maiúsculas.

lowercase → Transforma todas as letras em minúsculas.

full-width → Transforma todos os caracteres em uma versão de largura completa (útil para escrita asiática, como japonês).

inherit → Herda o valor da propriedade do elemento pai.

initial → Reseta para o valor inicial (equivalente a none).

unset → Remove a configuração e aplica herança se existir, senão volta ao valor inicial.

👉 Exemplo de uso:

p {
  text-transform: uppercase;
}-->
    <style>
        p{
            text-transform: inherit;
        }

    </style>
</head>
<body>
    <h1>Propriedade <code>text-transform</code></h1>
    <p>É RESPONSÁVEL por definor quais caracteres vão estar em Maiúsculo, minpusculo. etc</p>
</body>
</html>
